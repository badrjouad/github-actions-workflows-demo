name: Events Demo 1
on:
  push:
  pull_request:
    types: [opened]
  workflow_dispatch:

jobs:
  validate-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - name: Validate PR Title Format
      run: |
        PR_TITLE="${{ github.event.pull_request.title }}"
        echo "PR Title: $PR_TITLE"
        
        # Valid prefixes: feat:, fix:, docs:, style:, refactor:, test:, chore:
        if [[ $PR_TITLE =~ ^(feat|fix|docs|style|refactor|test|chore|perf|ci): ]]; then
          echo "✅ PR title format is valid!"
        else
          echo "❌ PR title must start with one of: feat:, fix:, docs:, style:, refactor:, test:, chore:, perf:, ci:"
          exit 1
        fi

  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Output event data
      run: echo "${{ toJSON(github.event) }}"
    
    - name: Get code
      uses: actions/checkout@v3
    
    - name: Install dependencies
      run: npm ci
    
    - name: Test code
      run: npm run test
    
    - name: Build code
      run: npm run build
    
    - name: Deploy project
      run: echo "Deploying..."

